// Протокол пакетов LoRa — Mesh-net Тропы (версия 2)
//
// Фиксированный бинарный формат 82 байта (НЕ protobuf-encoded на проводе!).
// Этот файл — схема / документация структуры пакета.
// Реальная сериализация — вручную, побайтово:
//   C++:    firmware/esp32-terminal/lib/mesh_packet/
//   Python: services/lora-station/lora_station/packet.py
//
// Версия 2 расширила пакет с 64 до 82 байт ради:
//   * packet_id (uint16) для ACK-протокола (гарантированная доставка)
//   * flags-байт (want_ack, is_ack, channel внутри bits — освободили байт)
//   * payload 48→64 байт (CHAT-текст теперь до ~32 русских символов)
// Старые v1 узлы новые пакеты не поймут (CRC отвалится из-за другого размера)
// — все ESP32 и lora-station должны быть перепрошиты синхронно.
//
// Раскладка байт в пакете (82 байта):
//   [0]      version    — версия протокола, сейчас 2
//   [1]      type       — 0=PING, 1=CHAT, 2=SOS, 3=ACK
//   [2]      flags      — bit0=WANT_ACK, bit1=IS_ACK,
//                          bit2-3=channel (00=TOURIST, 01=RESCUE),
//                          bit4-7=reserved
//   [3]      ttl        — Time To Live (декрементируется при ретрансляции, default=3)
//   [4-5]    device_id  — ID источника (uint16, big-endian)
//   [6-7]    packet_id  — счётчик исходящих на этом узле (uint16 BE, wraparound 65536).
//                          Используется получателем для ACK-matching и дедупа retry.
//   [8-11]   latitude   — × 1e6, int32 big-endian (43.45 → 43450000)
//   [12-15]  longitude  — × 1e6, int32 big-endian
//   [16-79]  payload    — 64 байта, тип-зависимый блок (остаток 0x00)
//   [80-81]  crc16      — CRC-16/CCITT-FALSE от байт [0..79], big-endian

syntax = "proto3";
package meshnet;

enum PacketType {
  PING = 0;   // Периодический маяк с координатами (каждые ~20 сек)
  CHAT = 1;   // Текстовое сообщение (UTF-8, до 64 байт в payload)
  SOS  = 2;   // Сигнал бедствия (отправляется 3 раза с интервалом 500 мс)
  ACK  = 3;   // Подтверждение доставки конкретного packet_id
}

enum Channel {
  TOURIST = 0;  // Открытый канал — все устройства
  RESCUE  = 1;  // Закрытый канал — только база и инфо-точки
}

// --- Биты в поле flags ---
// FLAG_WANT_ACK    = 0x01  — отправитель ждёт ACK на этот пакет
// FLAG_IS_ACK      = 0x02  — этот пакет САМ является ACK (его слушают по packet_id из payload)
// FLAG_CHANNEL_LO  = 0x04  — младший бит channel (для совместимости с layout)
// FLAG_CHANNEL_HI  = 0x08  — старший бит channel
// (биты 4-7 — резерв, ставить в 0)

// Логическое представление (для документации / Python dataclass)
message MeshPacket {
  uint32     version    = 1;  // всегда 2
  PacketType type       = 2;
  uint32     flags      = 3;  // uint8 на проводе
  uint32     ttl        = 4;  // uint8 на проводе, default 3
  uint32     device_id  = 5;  // uint16 на проводе
  uint32     packet_id  = 6;  // uint16 на проводе
  sint32     latitude   = 7;  // × 1e6
  sint32     longitude  = 8;  // × 1e6
  bytes      payload    = 9;  // ровно 64 байта на проводе
  uint32     crc16      = 10; // uint16 на проводе
}

// --- Структуры payload по типам ---

// PING payload[0..63]:
//   [0]    battery_pct  — заряд 0–100 %
//   [1]    rssi_last    — RSSI последнего пакета (int8, 0=нет данных)
//   [2-3]  seq          — порядковый номер (uint16, big-endian) — отдельно от packet_id,
//                          т.к. seq — это «номер ping», packet_id — общий для всех типов
//   [4-63] зарезервировано, 0x00

// CHAT payload[0..63]:
//   [0-63] текст UTF-8, остаток 0x00 (максимум 64 байта = ~32 русских символа)

// SOS payload[0..63]:
//   [0]    sos_type  — 0=неизвестно, 1=падение, 2=медицина, 3=заблудился, 4=погода
//   [1-63] сообщение UTF-8, остаток 0x00

// ACK payload[0..63]:
//   [0-1]  ack_for_device_id  — device_id originator-а (кому ACK предназначен), uint16 BE
//   [2-3]  ack_for_packet_id  — какой packet_id подтверждаем, uint16 BE
//   [4-63] зарезервировано, 0x00
//
// Логика ACK:
//   1. ESP32 шлёт CHAT с want_ack=1, packet_id=42
//   2. База обрабатывает, формирует ACK с ack_for_device_id=ESP32.id, ack_for_packet_id=42,
//      device_id=база.id (источник ACK), is_ack=1, want_ack=0
//   3. ESP32 ловит, сверяет ack_for_device_id с собой, ack_for_packet_id — со своей
//      pending-таблицей. Совпадение — снимаем retry-таймер
//
// Только конечный получатель шлёт ACK (никакие ретрансляторы) — иначе на 3-узловой
// топологии турист получил бы 2 ACK (от инфо-точки и от базы), что путает retry-логику.
