<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh-net Тропы — База спасателей</title>
    <link rel="stylesheet" href="/lib/leaflet.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Mesh-net Тропы — База спасателей</h1>
        <div id="status">
            <span id="ws-status" class="status-offline">WS: offline</span>
            <span id="stats-line"></span>
        </div>
    </header>

    <main>
        <aside id="sidebar">
            <section>
                <h2>SOS-инциденты <span id="sos-count" class="badge badge-red">0</span></h2>
                <ul id="sos-list" class="list">
                    <li class="empty">пусто</li>
                </ul>
            </section>
            <section>
                <h2>Туристы в эфире <span id="tourists-count" class="badge">0</span></h2>
                <ul id="tourists-list" class="list">
                    <li class="empty">загрузка…</li>
                </ul>
            </section>
        </aside>

        <div id="map"></div>

        <aside id="chat-panel">
            <div id="chat-header">
                <h2>ИИ-диспетчер</h2>
                <button id="chat-clear" type="button" title="Очистить историю">✕</button>
            </div>
            <div id="chat-log">
                <div class="chat-msg chat-system">
                    Спрашивай по-русски. Примеры:
                    «кто сейчас в эфире?», «есть ли открытые SOS?»,
                    «трек устройства 16 за последний час».
                </div>
            </div>
            <form id="chat-form">
                <textarea id="chat-input" rows="2"
                          placeholder="Сообщение… (Enter — отправить, Shift+Enter — новая строка)"
                          maxlength="2000"></textarea>
                <button type="submit" id="chat-send">→</button>
            </form>
        </aside>
    </main>

    <script src="/lib/leaflet.js"></script>
    <script src="/app.js"></script>
</body>
</html>
