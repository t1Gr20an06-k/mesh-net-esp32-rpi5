; PlatformIO Project Configuration File
;
; Плата: ESP32-S3-N16R8 (ESP32-S3-WROOM-1, 16 МБ Flash + 8 МБ PSRAM OPI)
; Двойной USB Type-C: один через USB-UART мост для прошивки/монитора,
; второй — нативный USB-OTG самого ESP32-S3.

[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; --- Память (критично для N16R8!) -------------------------------------------
; qio_opi = Flash в QIO режиме + PSRAM в OPI (octal) режиме.
; Без этого 8 МБ PSRAM не инициализируются.
board_build.arduino.memory_type = qio_opi

; 16 МБ Flash и подходящая таблица разделов, иначе
; используется только 4 МБ по умолчанию и 12 МБ пропадают.
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; --- Пины HT-RA62 (SX1262) → ESP32-S3 --------------------------------------
; MOSI=11, MISO=13, SCK=12, CS=10, RESET=9, DIO1=14, BUSY=8
build_flags =
    ; Включить PSRAM в Arduino core
    -D BOARD_HAS_PSRAM

    ; LoRa пины
    -D LORA_MOSI=11
    -D LORA_MISO=13
    -D LORA_SCK=12
    -D LORA_CS=10
    -D LORA_RESET=9
    -D LORA_DIO1=14
    -D LORA_BUSY=8
    -D LORA_FREQ=868.0

    ; HTTPS-сервер — логировать только ошибки.
    ; 1=Error, 2=+Warn, 3=+Info(default), 4=+Debug. Info шумит на каждый
    ; GET /api/status и ломает наши строки [TX] межъядерным interleave-ом.
    -D HTTPS_LOGLEVEL=1

lib_deps =
    ; RadioLib — поддержка SX1262 / LoRa
    jgromes/RadioLib @ ^6.6.0
    ; HTTPS-сервер на ESP32 — нужен для browser navigator.geolocation,
    ; который работает только в secure context (HTTPS либо localhost).
    ; Сертификат — самоподписанный, в include/cert.h, регенерируется
    ; через scripts/gen_cert.sh.
    fhessel/esp32_https_server @ ^1.0.0

; Библиотека fhessel/esp32_https_server v1.0.0 не обновлялась с 2022 и
; #include'ит <hwcrypto/sha.h>, которого больше нет в ESP-IDF. Скрипт
; автоматически подменяет хэш на mbedtls перед каждой сборкой.
extra_scripts = pre:scripts/patch_esp32_https_server.py
